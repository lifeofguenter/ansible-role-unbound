{% set unbound_effective_modules = unbound_modules | list %}
{% if (unbound_rpz_zones | default([]) | length > 0) and ('respip' not in unbound_effective_modules) %}
{% if 'validator' in unbound_effective_modules %}
{% set _respip_idx = unbound_effective_modules.index('validator') %}
{% elif 'iterator' in unbound_effective_modules %}
{% set _respip_idx = unbound_effective_modules.index('iterator') %}
{% else %}
{% set _respip_idx = unbound_effective_modules | length %}
{% endif %}
{% set unbound_effective_modules = unbound_effective_modules[:_respip_idx] + ['respip'] + unbound_effective_modules[_respip_idx:] %}
{% endif %}
server:
  module-config: "{{ unbound_effective_modules | join(' ') }}"
  verbosity: 0
  # get one from https://www.internic.net/domain/named.cache
  root-hints: "/var/lib/unbound/named.cache"

{% for unbound_interface in unbound_interfacess %}
  interface: {{ unbound_interface }}
{% endfor %}
  port: {{ unbound_listen_port }}

  do-ip6: {{ unbound_enable_ipv6 }}

  username: "unbound"
  directory: "/etc/unbound"
  chroot: ""
  pidfile: "/run/unbound.pid"

  # security
{% for item in unbound_access_control %}
  access-control: {{ item }}
{% endfor %}

  hide-identity: no
  hide-version: yes

  do-not-query-localhost: {{ unbound_do_not_query_localhost }}
{% for domain in unbound_domain_insecure | default([]) %}
  domain-insecure: "{{ domain }}"
{% endfor %}

  # performance
  prefetch: yes
  prefetch-key: yes
  fast-server-permil: 900

  # reliability
  infra-keep-probing: {{ unbound_infra_keep_probing }}
  so-reuseport: yes
{% if unbound_serve_expired_ttl is defined and unbound_serve_expired_ttl|int > 0 %}
  serve-expired: yes
  serve-expired-ttl: {{ unbound_serve_expired_ttl|int }}
  serve-expired-client-timeout: 1800
{% endif %}

  outgoing-range: 4096
  num-queries-per-thread: 2048
  num-threads: {{ unbound_num_threads }}
  msg-cache-slabs: {{ unbound_num_threads }}
  rrset-cache-slabs: {{ unbound_num_threads }}
  infra-cache-slabs: {{ unbound_num_threads }}
  key-cache-slabs: {{ unbound_num_threads }}

  rrset-cache-size: {{ (unbound_memory/3*2)|int|abs }}m
  msg-cache-size: {{ (unbound_memory/3)|int|abs }}m

  so-rcvbuf: {{ unbound_udp_buffer }}
  so-sndbuf: {{ unbound_udp_buffer }}

  cache-min-ttl: 60
  cache-max-negative-ttl: 300

  tls-cert-bundle: /etc/ssl/certs/ca-certificates.crt

  # stats
  statistics-interval: 0
  statistics-cumulative: no
  extended-statistics: yes

remote-control:
  control-enable: yes
  control-interface: 127.0.0.1
  control-use-cert: yes
  server-key-file: "/etc/unbound/unbound_server.key"
  server-cert-file: "/etc/unbound/unbound_server.pem"
  control-key-file: "/etc/unbound/unbound_control.key"
  control-cert-file: "/etc/unbound/unbound_control.pem"

{% if unbound_forward_addrs | default([]) | length > 0 %}
forward-zone:
  name: "."
  forward-tls-upstream: yes
{% for forward_addr in unbound_forward_addrs %}
  forward-addr: {{ forward_addr }}
{% endfor %}
{% endif %}
{% for zone in unbound_forward_zones | default([]) %}
forward-zone:
  name: "{{ zone.name }}"
{% if zone.addrs | select('search', '#') | list | length > 0 %}
  forward-tls-upstream: yes
{% endif %}
{% for addr in zone.addrs %}
  forward-addr: {{ addr }}
{% endfor %}
{% endfor %}
{% for rpz in unbound_rpz_zones | default([]) %}
rpz:
  name: "{{ rpz.name }}"
{% if rpz.url is defined %}
  url: {{ rpz.url }}
{% endif %}
{% if rpz.zonefile is defined %}
  zonefile: "{{ rpz.zonefile }}"
{% endif %}
{% if rpz.rpz_action_override is defined %}
  rpz-action-override: {{ rpz.rpz_action_override }}
{% endif %}
{% endfor %}

include: /etc/unbound/unbound.conf.d/*.conf
