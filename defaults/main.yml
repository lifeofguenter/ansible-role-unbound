---

unbound_interfacess:
  - 127.0.0.1

unbound_listen_port: 53

unbound_memory: 384

unbound_num_threads: "{{ ansible_facts.processor_vcpus }}"

unbound_access_control:
  - 127.0.0.0/8 allow
  - 10.0.0.0/8 allow
  - 172.16.0.0/12 allow
  - 192.168.0.0/16 allow

unbound_do_not_query_localhost: 'yes'

unbound_udp_buffer: 4m

unbound_enable_ipv6: 'yes'

unbound_default_release: '{{ ansible_facts.distribution_release }}'

unbound_modules:
  - subnetcache
  - validator
  - iterator

# Keep probing hosts that are marked down instead of caching them as
# unreachable for the full TTL. Improves resilience when upstreams flap.
unbound_infra_keep_probing: 'yes'

# List of domains for which DNSSEC validation is disabled (domain-insecure).
unbound_domain_insecure: []

# List of RPZ (Response Policy Zone) block lists. Each item is a mapping:
#   name:                (required) unique zone name
#   url:                 (optional) http(s) source to fetch the zone from
#   zonefile:            (optional) local path to store/read the zone
#   action_override:     (optional) e.g. nxdomain, nodata, drop, disabled
#   log:                 (optional) 'yes' to log all applied RPZ actions
#   log_name:            (optional) string to include in the RPZ log line
# Defining any RPZ zone automatically loads the "respip" module.
unbound_rpz_zones: []

# List of forward zones. Each item is a mapping:
#   name:  (required) zone name, e.g. "." or "internal.example.com"
#   addrs: (required) list of forward-addr entries. If any address contains
#          a '#' (DNS-over-TLS auth name, e.g. 1.1.1.1@853#cloudflare-dns.com)
#          then forward-tls-upstream is enabled for that zone.
unbound_forward_zones: []
